<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Digimon Line Calculator</title>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            color: white;
            margin: 0;
            padding: 20px;
        }

        #ui-panel {
            padding: 15px;
            background-color: #333;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        #total-stats {
            margin: 0 0 15px 0;
            color: #ffcc00;
            text-align: center;
            font-size: 24px;
        }

        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 15px;
            background-color: #222;
            padding: 15px;
            border-radius: 5px;
        }

        .control-section {
            border-right: 1px solid #444;
            padding-right: 15px;
        }

            .control-section:last-child {
                border-right: none;
            }

        h3 {
            margin-top: 0;
            color: #4287f5;
            font-size: 16px;
            margin-bottom: 10px;
        }

        select, input[type="text"], button {
            padding: 6px;
            margin-bottom: 8px;
            width: 100%;
            background: #444;
            color: white;
            border: 1px solid #666;
            box-sizing: border-box;
        }

        button {
            cursor: pointer;
            background: #4287f5;
            border: none;
            font-weight: bold;
            border-radius: 4px;
        }

            button:hover {
                background: #326fd1;
            }

        label {
            display: block;
            font-size: 13px;
            margin-bottom: 6px;
            cursor: pointer;
        }

        #mynetwork {
            width: 100%;
            height: 75vh;
            border: 1px solid #444;
            background-color: #111;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div id="ui-panel">
        <h2 id="total-stats">Loading Database...</h2>

        <div class="controls-grid">
            <div class="control-section">
                <h3>1. Search Digimon</h3>
                <input type="text" id="searchBox" placeholder="e.g. Agumon">
                <button onclick="searchAndFocus()">Locate & Highlight</button>
                <button onclick="resetGraph()" style="background: #666;">Reset View</button>
            </div>

            <div class="control-section">
                <h3>2. Route Finder (BFS)</h3>
                <select id="start-mon"><option value="">Select Start...</option></select>
                <select id="end-mon"><option value="">Select Target...</option></select>
                <label><input type="checkbox" id="allow-dedigivolve"> Allow De-digivolution</label>
                <button onclick="findRoute()">Calculate Shortest Path</button>
            </div>

            <div class="control-section">
                <h3>3. Graph Filters</h3>
                <select id="filter-level"><option>Filter by Level (All)</option></select>
                <select id="filter-attribute"><option>Filter by Attribute (All)</option></select>
                <button onclick="alert('Filtering coming next!')">Apply Filters</button>
            </div>

            <div class="control-section">
                <h3>4. Level Adjustments</h3>
                <label><input type="checkbox" id="armor-champ" checked onchange="updateTCGRules()"> Armor = Champion (Lv.4)</label>
                <label><input type="checkbox" id="hybrid-champ" checked onchange="updateTCGRules()"> Human Spirit = Champion</label>
                <label><input type="checkbox" id="hybrid-ult" checked onchange="updateTCGRules()"> Beast Spirit = Ultimate (Lv.5)</label>
            </div>

            <div class="control-section">
                <h3>2. Route Finder (BFS & Smart)</h3>
                <select id="start-mon"><option value="">Select Start...</option></select>
                <select id="end-mon"><option value="">Select Target...</option></select>
                <label><input type="checkbox" id="allow-dedigivolve"> Allow De-digivolution</label>

                <div style="display: flex; gap: 5px;">
                    <button onclick="findRoute(false)">Canonical BFS</button>
                    <button onclick="findRoute(true)" style="background: #a142f5;">KarnEX Engine</button>
                </div>

                <div id="route-readout" style="margin-top: 10px; font-size: 13px; color: #ffcc00; max-height: 120px; overflow-y: auto;"></div>
            </div>
        </div>
    </div>

    <div id="mynetwork"></div>
    <script src="script.js"></script>
</body>
</html>
