<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Digimon Line Calculator</title>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            color: white;
            margin: 0;
            padding: 20px;
        }

        #ui-panel {
            padding: 15px;
            background-color: #333;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        #total-stats {
            margin: 0 0 15px 0;
            color: #ffcc00;
            text-align: center;
            font-size: 24px;
        }

        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            background-color: #222;
            padding: 15px;
            border-radius: 5px;
        }

        .control-section {
            border-right: 1px solid #444;
            padding-right: 20px;
        }

            .control-section:last-child {
                border-right: none;
            }

        h3 {
            margin-top: 0;
            color: #4287f5;
            font-size: 16px;
        }

        select, button {
            padding: 5px;
            margin-top: 5px;
            width: 100%;
            background: #444;
            color: white;
            border: 1px solid #666;
        }

        button {
            cursor: pointer;
            background: #4287f5;
            border: none;
            font-weight: bold;
        }

            button:hover {
                background: #326fd1;
            }

        label {
            display: block;
            font-size: 14px;
            margin-bottom: 5px;
        }

        #mynetwork {
            width: 100%;
            height: 75vh;
            border: 1px solid #444;
            background-color: #111;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div id="ui-panel">
        <h2 id="total-stats">Loading Database...</h2>

        <div class="controls-grid">
            <div class="control-section">
                <h3>1. Route Finder (Coming Soon)</h3>
                <select id="start-mon"><option>Select Start Digimon...</option></select>
                <select id="end-mon"><option>Select Target Digimon...</option></select>
                <label><input type="checkbox" id="allow-dedigivolve"> Allow De-digivolution</label>
                <button onclick="alert('Routing logic coming next!')">Find Paths</button>
            </div>

            <div class="control-section">
                <h3>2. Graph Filters (Coming Soon)</h3>
                <select id="filter-level"><option>Filter by Level (All)</option></select>
                <select id="filter-attribute"><option>Filter by Attribute (All)</option></select>
                <button onclick="alert('Filtering coming next!')">Apply Filters</button>
            </div>

            <div class="control-section">
                <h3>3. Level Adjustments</h3>
                <label><input type="checkbox" id="armor-champ" checked> Treat Armor as Champion (Lv.4)</label>
                <label><input type="checkbox" id="hybrid-champ" checked> Treat Human Spirit as Champion</label>
                <label><input type="checkbox" id="hybrid-ult" checked> Treat Beast Spirit as Ultimate</label>
            </div>
        </div>
    </div>

    <div id="mynetwork"></div>
    <script src="script.js"></script>
</body>
</html>
